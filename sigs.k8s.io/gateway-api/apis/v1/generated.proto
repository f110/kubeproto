message GRPCRouteMatch {
  // Method specifies a gRPC request service/method matcher. If this field is
  // not specified, all services and methods will match.
  optional GRPCMethodMatch method = 1 [(dev.f110.kubeproto.field) = { go_name: "Method", api_field_name: "method", inline: false }];
  // Headers specifies gRPC request header matchers. Multiple match values are
  // ANDed together, meaning, a request MUST match all the specified headers
  // to select the route.
  repeated GRPCHeaderMatch headers = 2 [(dev.f110.kubeproto.field) = { go_name: "Headers", api_field_name: "headers", inline: false }];
}

message GRPCRouteRule {
  // Name is the name of the route rule. This name MUST be unique within a Route if it is set.
  // Support: Extended
  string name = 1 [(dev.f110.kubeproto.field) = { go_name: "Name", api_field_name: "name", inline: false }];
  // Matches define conditions used for matching the rule against incoming
  // gRPC requests. Each match is independent, i.e. this rule will be matched
  // if **any** one of the matches is satisfied.
  // For example, take the following matches configuration:
  // ```
  // matches:
  // - method:
  //     service: foo.bar
  //   headers:
  //     values:
  //       version: 2
  // - method:
  //     service: foo.bar.v2
  // ```
  // For a request to match against this rule, it MUST satisfy
  // EITHER of the two conditions:
  // - service of foo.bar AND contains the header `version: 2`
  // - service of foo.bar.v2
  // See the documentation for GRPCRouteMatch on how to specify multiple
  // match conditions to be ANDed together.
  // If no matches are specified, the implementation MUST match every gRPC request.
  // Proxy or Load Balancer routing configuration generated from GRPCRoutes
  // MUST prioritize rules based on the following criteria, continuing on
  // ties. Merging MUST not be done between GRPCRoutes and HTTPRoutes.
  // Precedence MUST be given to the rule with the largest number of:
  // * Characters in a matching non-wildcard hostname.
  // * Characters in a matching hostname.
  // * Characters in a matching service.
  // * Characters in a matching method.
  // * Header matches.
  // If ties still exist across multiple Routes, matching precedence MUST be
  // determined in order of the following criteria, continuing on ties:
  // * The oldest Route based on creation timestamp.
  // * The Route appearing first in alphabetical order by
  //   "{namespace}/{name}".
  // If ties still exist within the Route that has been given precedence,
  // matching precedence MUST be granted to the first matching rule meeting
  // the above criteria.
  repeated GRPCRouteMatch matches = 2 [(dev.f110.kubeproto.field) = { go_name: "Matches", api_field_name: "matches", inline: false }];
  // Filters define the filters that are applied to requests that match
  // this rule.
  // The effects of ordering of multiple behaviors are currently unspecified.
  // This can change in the future based on feedback during the alpha stage.
  // Conformance-levels at this level are defined based on the type of filter:
  // - ALL core filters MUST be supported by all implementations that support
  //   GRPCRoute.
  // - Implementers are encouraged to support extended filters.
  // - Implementation-specific custom filters have no API guarantees across
  //   implementations.
  // Specifying the same filter multiple times is not supported unless explicitly
  // indicated in the filter.
  // If an implementation cannot support a combination of filters, it must clearly
  // document that limitation. In cases where incompatible or unsupported
  // filters are specified and cause the `Accepted` condition to be set to status
  // `False`, implementations may use the `IncompatibleFilters` reason to specify
  // this configuration error.
  // Support: Core
  repeated GRPCRouteFilter filters = 3 [(dev.f110.kubeproto.field) = { go_name: "Filters", api_field_name: "filters", inline: false }];
  // BackendRefs defines the backend(s) where matching requests should be
  // sent.
  // Failure behavior here depends on how many BackendRefs are specified and
  // how many are invalid.
  // If *all* entries in BackendRefs are invalid, and there are also no filters
  // specified in this route rule, *all* traffic which matches this rule MUST
  // receive an `UNAVAILABLE` status.
  // See the GRPCBackendRef definition for the rules about what makes a single
  // GRPCBackendRef invalid.
  // When a GRPCBackendRef is invalid, `UNAVAILABLE` statuses MUST be returned for
  // requests that would have otherwise been routed to an invalid backend. If
  // multiple backends are specified, and some are invalid, the proportion of
  // requests that would otherwise have been routed to an invalid backend
  // MUST receive an `UNAVAILABLE` status.
  // For example, if two backends are specified with equal weights, and one is
  // invalid, 50 percent of traffic MUST receive an `UNAVAILABLE` status.
  // Implementations may choose how that 50 percent is determined.
  // Support: Core for Kubernetes Service
  // Support: Implementation-specific for any other resource
  // Support for weight: Core
  repeated GRPCBackendRef backend_refs = 4 [(dev.f110.kubeproto.field) = { go_name: "BackendRefs", api_field_name: "backendRefs", inline: false }];
  // SessionPersistence defines and configures session persistence
  // for the route rule.
  // Support: Extended
  // <gateway:experimental>
  optional SessionPersistence session_persistence = 5 [(dev.f110.kubeproto.field) = { go_name: "SessionPersistence", api_field_name: "sessionPersistence", inline: false }];
}

message GRPCRouteSpec {
  CommonRouteSpec common_route_spec = 1 [(dev.f110.kubeproto.field) = { go_name: "CommonRouteSpec", inline: true }];
  // Hostnames defines a set of hostnames to match against the GRPC
  // Host header to select a GRPCRoute to process the request. This matches
  // the RFC 1123 definition of a hostname with 2 notable exceptions:
  // 1. IPs are not allowed.
  // 2. A hostname may be prefixed with a wildcard label (`*.`). The wildcard
  //    label MUST appear by itself as the first label.
  // If a hostname is specified by both the Listener and GRPCRoute, there
  // MUST be at least one intersecting hostname for the GRPCRoute to be
  // attached to the Listener. For example:
  // * A Listener with `test.example.com` as the hostname matches GRPCRoutes
  //   that have either not specified any hostnames, or have specified at
  //   least one of `test.example.com` or `*.example.com`.
  // * A Listener with `*.example.com` as the hostname matches GRPCRoutes
  //   that have either not specified any hostnames or have specified at least
  //   one hostname that matches the Listener hostname. For example,
  //   `test.example.com` and `*.example.com` would both match. On the other
  //   hand, `example.com` and `test.example.net` would not match.
  // Hostnames that are prefixed with a wildcard label (`*.`) are interpreted
  // as a suffix match. That means that a match for `*.example.com` would match
  // both `test.example.com`, and `foo.test.example.com`, but not `example.com`.
  // If both the Listener and GRPCRoute have specified hostnames, any
  // GRPCRoute hostnames that do not match the Listener hostname MUST be
  // ignored. For example, if a Listener specified `*.example.com`, and the
  // GRPCRoute specified `test.example.com` and `test.example.net`,
  // `test.example.net` MUST NOT be considered for a match.
  // If both the Listener and GRPCRoute have specified hostnames, and none
  // match with the criteria above, then the GRPCRoute MUST NOT be accepted by
  // the implementation. The implementation MUST raise an 'Accepted' Condition
  // with a status of `False` in the corresponding RouteParentStatus.
  // If a Route (A) of type HTTPRoute or GRPCRoute is attached to a
  // Listener and that listener already has another Route (B) of the other
  // type attached and the intersection of the hostnames of A and B is
  // non-empty, then the implementation MUST accept exactly one of these two
  // routes, determined by the following criteria, in order:
  // * The oldest Route based on creation timestamp.
  // * The Route appearing first in alphabetical order by
  //   "{namespace}/{name}".
  // The rejected Route MUST raise an 'Accepted' condition with a status of
  // 'False' in the corresponding RouteParentStatus.
  // Support: Core
  repeated string hostnames = 2 [(dev.f110.kubeproto.field) = { go_name: "Hostnames", api_field_name: "hostnames", inline: false }];
  // Rules are a list of GRPC matchers, filters and actions.
  // <gateway:experimental:validation:XValidation:message="Rule name must be unique within the route",rule="self.all(l1, !has(l1.name) || self.exists_one(l2, has(l2.name) && l1.name == l2.name))">
  repeated GRPCRouteRule rules = 3 [(dev.f110.kubeproto.field) = { go_name: "Rules", api_field_name: "rules", inline: false }];
}

